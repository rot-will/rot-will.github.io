        <h1 id="processHttpMessage"><a href="#processHttpMessage" class="headerlink" title="processHttpMessage"></a>processHttpMessage</h1><figure class="highlight python"><table><tr><td class="gutter"><pre><span class="line">1</span><br><span class="line">2</span><br><span class="line">3</span><br><span class="line">4</span><br><span class="line">5</span><br><span class="line">6</span><br><span class="line">7</span><br><span class="line">8</span><br><span class="line">9</span><br><span class="line">10</span><br><span class="line">11</span><br><span class="line">12</span><br><span class="line">13</span><br><span class="line">14</span><br><span class="line">15</span><br><span class="line">16</span><br><span class="line">17</span><br><span class="line">18</span><br><span class="line">19</span><br><span class="line">20</span><br><span class="line">21</span><br><span class="line">22</span><br><span class="line">23</span><br><span class="line">24</span><br><span class="line">25</span><br><span class="line">26</span><br><span class="line">27</span><br><span class="line">28</span><br><span class="line">29</span><br><span class="line">30</span><br><span class="line">31</span><br><span class="line">32</span><br><span class="line">33</span><br><span class="line">34</span><br><span class="line">35</span><br><span class="line">36</span><br><span class="line">37</span><br><span class="line">38</span><br><span class="line">39</span><br><span class="line">40</span><br><span class="line">41</span><br><span class="line">42</span><br><span class="line">43</span><br><span class="line">44</span><br><span class="line">45</span><br><span class="line">46</span><br><span class="line">47</span><br><span class="line">48</span><br><span class="line">49</span><br><span class="line">50</span><br><span class="line">51</span><br><span class="line">52</span><br><span class="line">53</span><br><span class="line">54</span><br><span class="line">55</span><br><span class="line">56</span><br><span class="line">57</span><br><span class="line">58</span><br><span class="line">59</span><br><span class="line">60</span><br><span class="line">61</span><br><span class="line">62</span><br><span class="line">63</span><br><span class="line">64</span><br><span class="line">65</span><br><span class="line">66</span><br><span class="line">67</span><br><span class="line">68</span><br><span class="line">69</span><br><span class="line">70</span><br><span class="line">71</span><br><span class="line">72</span><br></pre></td><td class="code"><pre><span class="line"><span class="string">&quot;&quot;&quot;</span></span><br><span class="line"><span class="string">	在发送请求包 或 获取响应包时触发</span></span><br><span class="line"><span class="string">&quot;&quot;&quot;</span></span><br><span class="line"><span class="keyword">def</span> <span class="title function_">processHttpMessage</span>(<span class="params">self, toolFlag, messageIsRequest, messageInfo</span>):</span><br><span class="line">	<span class="comment"># toolFlag 用来表示数据包是通过哪个工具发送或接收</span></span><br><span class="line">	<span class="comment"># messageIsRequest 用来表示数据包是否为 请求包</span></span><br><span class="line">	<span class="comment"># messageInfo 保存了数据包的详细信息 也可以用来修改</span></span><br><span class="line">		<span class="string">&quot;&quot;&quot;</span></span><br><span class="line"><span class="string">		 获取信息</span></span><br><span class="line"><span class="string">			使用getHttpService() 获取服务器信息</span></span><br><span class="line"><span class="string">				ser=messageInfo.getHttpService()</span></span><br><span class="line"><span class="string">			  获取端口</span></span><br><span class="line"><span class="string">					ser.port</span></span><br><span class="line"><span class="string">					ser.getPort()</span></span><br><span class="line"><span class="string">				获取目标主机</span></span><br><span class="line"><span class="string">					ser.host</span></span><br><span class="line"><span class="string">					ser.getHost()</span></span><br><span class="line"><span class="string">				获取协议名</span></span><br><span class="line"><span class="string">					ser.protocol</span></span><br><span class="line"><span class="string">					ser.getProtocol()</span></span><br><span class="line"><span class="string">			使用getResponse() 获取请求包内容</span></span><br><span class="line"><span class="string">			使用getRequest()  获取响应包内容</span></span><br><span class="line"><span class="string">		  可以使用registerExtenderCallbacks 中使用 callbacks.getHelpers() 创建的变量进行格式化</span></span><br><span class="line"><span class="string">			res=self.helpers.analyzeResponse(messageInfo.getResponse())</span></span><br><span class="line"><span class="string">			req=self.helpers.analyzeRequest(messageInfo.getRequest())</span></span><br><span class="line"><span class="string">				获取参数</span></span><br><span class="line"><span class="string">					req.parameters 作为列表存放了所有参数 包括 cookies </span></span><br><span class="line"><span class="string">					req.getParameters()</span></span><br><span class="line"><span class="string">				获取请求方式</span></span><br><span class="line"><span class="string">					req.method     </span></span><br><span class="line"><span class="string">					req.getMethod()</span></span><br><span class="line"><span class="string">				获取URL</span></span><br><span class="line"><span class="string">					req.url        </span></span><br><span class="line"><span class="string">					req.getUrl()</span></span><br><span class="line"><span class="string">				获取内容类型</span></span><br><span class="line"><span class="string">					req.contentType</span></span><br><span class="line"><span class="string">					req.getContentType()</span></span><br><span class="line"><span class="string">				获取HEADER</span></span><br><span class="line"><span class="string">					req.headers</span></span><br><span class="line"><span class="string">					req.getHeaders()</span></span><br><span class="line"><span class="string">				p=req.parameters[0]</span></span><br><span class="line"><span class="string">				获取参数名</span></span><br><span class="line"><span class="string">				  p.getName()</span></span><br><span class="line"><span class="string">					p.name</span></span><br><span class="line"><span class="string">				获取参数值</span></span><br><span class="line"><span class="string">					p.getValue()</span></span><br><span class="line"><span class="string">					p.value</span></span><br><span class="line"><span class="string">			  获取变量类型</span></span><br><span class="line"><span class="string">					p.type 表示变量类型值</span></span><br><span class="line"><span class="string">						PARAM_URL  0</span></span><br><span class="line"><span class="string">						PARAM_BODY  1</span></span><br><span class="line"><span class="string">						PARAM_COOKIE  2</span></span><br><span class="line"><span class="string">						PARAM_XML  3</span></span><br><span class="line"><span class="string">						PARAM_XML_ATTR  4</span></span><br><span class="line"><span class="string">						PARAM_MULTIPART_ATTR  5</span></span><br><span class="line"><span class="string">						PARAM_JSON  6					</span></span><br><span class="line"><span class="string">		&quot;&quot;&quot;</span></span><br><span class="line">		<span class="string">&quot;&quot;&quot;</span></span><br><span class="line"><span class="string">		 设置信息</span></span><br><span class="line"><span class="string">			setHttpService(info)</span></span><br><span class="line"><span class="string">				info 为 IHttpService 类</span></span><br><span class="line"><span class="string">				可以使用 from burp import IHttpService导入</span></span><br><span class="line"><span class="string">		  setRequest(data) </span></span><br><span class="line"><span class="string">				data为列表的形式 byte[]</span></span><br><span class="line"><span class="string">				可以使用self.helpers.stringToBytes(xxx)构造</span></span><br><span class="line"><span class="string">				为整个请求包的数据</span></span><br><span class="line"><span class="string">			setResponse(data)</span></span><br><span class="line"><span class="string">				data为列表的形式 byte[]</span></span><br><span class="line"><span class="string">				可以使用self.helpers.stringToBytes(xxx)构造</span></span><br><span class="line"><span class="string">				为整个响应包的数据</span></span><br><span class="line"><span class="string">		&quot;&quot;&quot;</span></span><br><span class="line">	<span class="keyword">return</span></span><br></pre></td></tr></table></figure>
